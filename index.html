<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>入校码</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f5f5;
  -webkit-text-size-adjust: 100%;
}
/* 顶部导航栏 - 模拟微信 webview */
.nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #e5e5e5;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-bar .nav-close {
  font-size: 20px;
  color: #333;
  cursor: pointer;
  width: 30px;
}
.nav-bar .nav-title {
  text-align: center;
  flex: 1;
}
.nav-bar .nav-title .title-text {
  font-size: 16px;
  font-weight: 500;
  color: #333;
}
.nav-bar .nav-title .title-sub {
  font-size: 11px;
  color: #999;
  margin-top: 2px;
}
.nav-bar .nav-more {
  font-size: 20px;
  color: #333;
  width: 30px;
  text-align: right;
  letter-spacing: -2px;
}

/* Tab 栏 */
.tab-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 16px;
  background: #fff;
  position: relative;
  border-bottom: 1px solid #f0f0f0;
}
.tab-bar .tab-item {
  font-size: 16px;
  color: #333;
  padding-bottom: 8px;
  border-bottom: 2px solid #333;
  font-weight: 500;
}
.tab-bar .tab-logout {
  position: absolute;
  right: 16px;
  font-size: 14px;
  color: #576b95;
  cursor: pointer;
}

/* QR 码区域 */
.qr-section {
  background: linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 100%);
  padding: 20px 0 24px;
  text-align: center;
}
.qr-section .time-display {
  font-size: 28px;
  font-weight: 500;
  color: #333;
  margin-bottom: 16px;
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
}
.qr-section .qr-wrapper {
  display: inline-block;
  background: #fff;
  padding: 12px;
  border-radius: 4px;
}
.qr-section .qr-hint {
  margin-top: 16px;
  font-size: 14px;
  color: #555;
}

/* 基本信息区域 */
.info-section {
  background: #fff;
  padding: 20px 16px;
  margin-top: 0;
}
.info-section .section-title {
  font-size: 16px;
  font-weight: 600;
  color: #333;
  margin-bottom: 16px;
}
.info-row {
  display: flex;
  padding: 10px 0;
  font-size: 15px;
  line-height: 1.5;
}
.info-row .info-label {
  color: #999;
  width: 80px;
  flex-shrink: 0;
}
.info-row .info-value {
  color: #333;
  flex: 1;
  word-break: break-all;
}
.info-row .info-value.green {
  color: #67b168;
  font-weight: 500;
}
.info-row .info-value .check-icon {
  color: #67b168;
  margin-left: 4px;
}

/* 校外人员信息 */
.extra-section {
  background: #fff;
  padding: 0 16px 20px;
  border-top: 1px solid #f5f5f5;
  padding-top: 16px;
}

/* 底部导航模拟 */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 44px;
  background: #f7f7f7;
  border-top: 1px solid #e5e5e5;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 80px;
}
.bottom-nav .nav-arrow {
  font-size: 22px;
  color: #999;
  cursor: pointer;
}
.page-content {
  padding-bottom: 50px;
}

/* 设置表单 */
.setup-page {
  padding: 20px 16px;
  background: #fff;
  min-height: 100vh;
}
.setup-page h2 {
  font-size: 20px;
  color: #333;
  margin-bottom: 8px;
  text-align: center;
}
.setup-page .setup-desc {
  font-size: 13px;
  color: #999;
  text-align: center;
  margin-bottom: 24px;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 14px;
  color: #666;
  margin-bottom: 6px;
}
.form-group input,
.form-group textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus,
.form-group textarea:focus {
  border-color: #67b168;
}
.form-group textarea {
  resize: vertical;
  min-height: 60px;
}
.form-row {
  display: flex;
  gap: 12px;
}
.form-row .form-group {
  flex: 1;
}
.submit-btn {
  width: 100%;
  padding: 12px;
  background: #67b168;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 20px;
}
.submit-btn:active {
  background: #5a9e5b;
}
</style>
</head>
<body>

<!-- 设置页面 -->
<div id="setupPage" class="setup-page" style="display:none;">
  <h2>入校码信息设置</h2>
  <p class="setup-desc">首次使用请填写以下信息，信息将保存在本机浏览器中</p>
  <form id="setupForm">
    <div class="form-group">
      <label>姓名 *</label>
      <input type="text" id="f_name" placeholder="请输入姓名" required>
    </div>
    <div class="form-group">
      <label>工号 *</label>
      <input type="text" id="f_id" placeholder="例如: wlry322739" required>
    </div>
    <div class="form-group">
      <label>手机号 *</label>
      <input type="tel" id="f_phone" placeholder="请输入手机号" required>
    </div>
    <div class="form-group">
      <label>身份证号 *</label>
      <input type="text" id="f_idcard" placeholder="请输入身份证号" required>
    </div>
    <div class="form-group">
      <label>人员类别</label>
      <input type="text" id="f_category" value="校外人员" placeholder="例如: 校外人员">
    </div>
    <div class="form-group">
      <label>部门</label>
      <input type="text" id="f_dept" value="校外人员" placeholder="例如: 校外人员">
    </div>
    <div class="form-group">
      <label>入校日期</label>
      <input type="date" id="f_date">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>入校时间(起)</label>
        <input type="time" id="f_time_start" value="08:00">
      </div>
      <div class="form-group">
        <label>入校时间(止)</label>
        <input type="time" id="f_time_end" value="17:00">
      </div>
    </div>
    <div class="form-group">
      <label>入校大门</label>
      <textarea id="f_gates" placeholder="例如: 留仙洞园区正门,官龙山园区正门,西丽湖园区正门,香蜜校区正门">留仙洞园区正门,官龙山园区正门,西丽湖园区正门,香蜜校区正门</textarea>
    </div>
    <div class="form-group">
      <label>对接人</label>
      <input type="text" id="f_contact" placeholder="可选">
    </div>
    <div class="form-group">
      <label>对接部门</label>
      <input type="text" id="f_contact_dept" placeholder="可选">
    </div>
    <button type="submit" class="submit-btn">保存并生成入校码</button>
  </form>
</div>

<!-- 主页面 -->
<div id="mainPage" class="page-content" style="display:none;">
  <!-- 顶部导航 -->
  <div class="nav-bar">
    <div class="nav-close">&times;</div>
    <div class="nav-title">
      <div class="title-text">入校码</div>
      <div class="title-sub">ehall.szpu.edu.cn</div>
    </div>
    <div class="nav-more">&middot;&middot;&middot;</div>
  </div>

  <!-- Tab栏 -->
  <div class="tab-bar">
    <div class="tab-item">入校码</div>
    <div class="tab-logout" id="logoutBtn">登出</div>
  </div>

  <!-- QR码区域 -->
  <div class="qr-section">
    <div class="time-display" id="timeDisplay">--:-- --:--:--</div>
    <div class="qr-wrapper">
      <div id="qrCode"></div>
    </div>
    <div class="qr-hint">出入学校时请出示此二维码</div>
  </div>

  <!-- 基本信息 -->
  <div class="info-section">
    <div class="section-title">基本信息</div>
    <div class="info-row">
      <div class="info-label">人员类别</div>
      <div class="info-value" id="v_category"></div>
    </div>
    <div class="info-row">
      <div class="info-label">工号</div>
      <div class="info-value" id="v_id"></div>
    </div>
    <div class="info-row">
      <div class="info-label">姓名</div>
      <div class="info-value" id="v_name"></div>
    </div>
    <div class="info-row">
      <div class="info-label">手机号</div>
      <div class="info-value" id="v_phone"></div>
    </div>
    <div class="info-row">
      <div class="info-label">身份证号</div>
      <div class="info-value" id="v_idcard"></div>
    </div>
    <div class="info-row">
      <div class="info-label">部门</div>
      <div class="info-value green" id="v_dept"></div>
    </div>
    <div class="info-row">
      <div class="info-label">入校时间</div>
      <div class="info-value" id="v_time"></div>
    </div>
    <div class="info-row">
      <div class="info-label">入校大门</div>
      <div class="info-value" id="v_gates"></div>
    </div>
  </div>

  <!-- 校外人员信息 -->
  <div class="extra-section">
    <div class="section-title">校外人员信息</div>
    <div class="info-row">
      <div class="info-label">对接人</div>
      <div class="info-value" id="v_contact"></div>
    </div>
    <div class="info-row">
      <div class="info-label">对接部门</div>
      <div class="info-value" id="v_contact_dept"></div>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <div class="nav-arrow">&lt;</div>
    <div class="nav-arrow">&gt;</div>
  </div>
</div>

<!-- QR Code 库 -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
(function() {
  const STORAGE_KEY = 'campus_pass_info';

  // 工具函数
  function padZero(n) { return n < 10 ? '0' + n : '' + n; }

  function updateTime() {
    const now = new Date();
    const mm = padZero(now.getMonth() + 1);
    const dd = padZero(now.getDate());
    const hh = padZero(now.getHours());
    const mi = padZero(now.getMinutes());
    const ss = padZero(now.getSeconds());
    document.getElementById('timeDisplay').textContent = mm + '-' + dd + ' ' + hh + ':' + mi + ':' + ss;
  }

  function generateUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }

  function generateQR() {
    var el = document.getElementById('qrCode');
    el.innerHTML = '';
    new QRCode(el, {
      text: 'https://ehall.szpu.edu.cn/pass/' + generateUUID(),
      width: 260,
      height: 260,
      colorDark: '#67b168',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }

  function loadInfo() {
    var data = localStorage.getItem(STORAGE_KEY);
    if (!data) return null;
    try { return JSON.parse(data); } catch(e) { return null; }
  }

  function saveInfo(info) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(info));
  }

  function getTodayStr() {
    var now = new Date();
    return now.getFullYear() + '-' + padZero(now.getMonth()+1) + '-' + padZero(now.getDate());
  }

  function showSetup() {
    document.getElementById('setupPage').style.display = 'block';
    document.getElementById('mainPage').style.display = 'none';
    // 设置默认日期为今天
    document.getElementById('f_date').value = getTodayStr();
  }

  function showMain(info) {
    document.getElementById('setupPage').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';

    // 填充信息
    document.getElementById('v_category').textContent = info.category || '校外人员';
    document.getElementById('v_id').textContent = info.id || '';
    document.getElementById('v_name').textContent = info.name || '';
    document.getElementById('v_phone').textContent = info.phone || '';
    document.getElementById('v_idcard').textContent = info.idcard || '';
    document.getElementById('v_dept').textContent = info.dept || '校外人员';

    // 入校时间
    var dateStr = info.date || getTodayStr();
    var timeStr = dateStr + ' ' + (info.time_start || '08:00') + '-' + (info.time_end || '17:00');
    document.getElementById('v_time').innerHTML = timeStr + '<span class="check-icon">&#10004;</span>';

    document.getElementById('v_gates').textContent = info.gates || '';
    document.getElementById('v_contact').textContent = info.contact || '';
    document.getElementById('v_contact_dept').textContent = info.contact_dept || '';

    // 启动时钟
    updateTime();
    setInterval(updateTime, 1000);

    // 生成 QR
    generateQR();
  }

  // 初始化
  function init() {
    var info = loadInfo();
    if (info) {
      showMain(info);
    } else {
      showSetup();
    }

    // 表单提交
    document.getElementById('setupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var info = {
        name: document.getElementById('f_name').value.trim(),
        id: document.getElementById('f_id').value.trim(),
        phone: document.getElementById('f_phone').value.trim(),
        idcard: document.getElementById('f_idcard').value.trim(),
        category: document.getElementById('f_category').value.trim() || '校外人员',
        dept: document.getElementById('f_dept').value.trim() || '校外人员',
        date: document.getElementById('f_date').value || getTodayStr(),
        time_start: document.getElementById('f_time_start').value || '08:00',
        time_end: document.getElementById('f_time_end').value || '17:00',
        gates: document.getElementById('f_gates').value.trim(),
        contact: document.getElementById('f_contact').value.trim(),
        contact_dept: document.getElementById('f_contact_dept').value.trim()
      };
      saveInfo(info);
      showMain(info);
    });

    // 登出
    document.getElementById('logoutBtn').addEventListener('click', function() {
      if (confirm('确定要登出吗？登出后需要重新填写信息。')) {
        localStorage.removeItem(STORAGE_KEY);
        showSetup();
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
